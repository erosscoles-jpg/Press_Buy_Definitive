<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/regiLog.css">
    <title>Registrar - Press Buy</title>
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav id="navbar">
            <div id="navbar-inner">
                <h2>Press Buy</h2>
                <ul id="navbar-links">
                    <li><a href="/paginas/index.html">Home</a></li>
                    <li><a href="#">Catalogo</a></li>
                    <li><a href="/paginas/login.html">Perfil</a></li>
                    <li><a href="#">Configurações</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h2>Registrar</h2>
            <form>
                <!-- NOME OU EMAIL -->
                <div class="box-input">
                    <label for="title"> 
                        Nome <span class="required-field">*</span>
                    </label>

                    <input 
                        type="text" 
                        name="title" 
                        id="title" 
                        class="block"
                        placeholder="Nome ou email" 
                        minlength="1" 
                        maxlength="30" 
                        required>
                </div>

                <!-- NOME OU EMAIL -->
                <div class="box-input">
                    <label for="title"> 
                        Email <span class="required-field">*</span>
                    </label>

                    <input 
                        type="email" 
                        name="email" 
                        id="email" 
                        class="block"
                        placeholder="Email" 
                        minlength="1" 
                        maxlength="30" 
                        required>
                </div>

                <!-- senha -->
                <div class="box-input">
                    <label for="title"> 
                        Senha <span class="required-field">*</span>
                    </label>

                    <input 
                        type="password" 
                        name="password" 
                        id="password" 
                        class="block"
                        placeholder="senha" 
                        minlength="1" 
                        maxlength="30" 
                        required>
                </div>

                <!-- senha -->
                <div class="box-input">
                    <label for="title"> 
                        Confirmar Senha <span class="required-field">*</span>
                    </label>

                    <input 
                        type="password" 
                        name="confpassword" 
                        id="ponfpassword" 
                        class="block"
                        placeholder="Confirmar senha" 
                        minlength="1" 
                        maxlength="30" 
                        required>
                </div>
                
                <input type="submit" value="Entrar">
            </form>
    </main>
</body>
</html>
