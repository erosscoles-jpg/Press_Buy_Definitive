<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Press Buy</title>
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav id="navbar">
            <div id="navbar-inner">
                <h2>Press Buy</h2>
                <ul id="navbar-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Catalogo</a></li>
                    <li><a href="#">Perfil</a></li>
                    <li><a href="#">Configurações</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <!-- BANNER  -->
        <div class="banner">
            <h2>Press buy</h2>
            <h3>Toda promoção de jogos, num só radar.</h3>
            <div class="banner-btn">
                <a href="#" class="btn-criar">Criar conta gratuita</a>
                <a href="#" class="btn-oferta">Ver ofertas</a>
            </div>
        </div>


    <!-- MAIN -->
     <div class="container">

        <aside id="search-bar">
            <form>
                <input type="submit" value="Filtrar">
                <input type="text" placeholder="Pesquisar jogos...">
                <input type="submit" value="Buscar">
                
            </form>
        </aside>

        <main id="cards-container">
            <!-- CARDS OFERTAS -->
            <article class="card-game">
                <a class="pag-game" href="#">
                    <img src="img/apps.21536.13727851868390641.c9cc5f66-aff8-406c-af6b-440838730be0.68796bde-cbf5-4eaa-a299-011417041da6" alt="halo infinit">
                    <h3 class="title">Halo Infinit</h3>
                    <div class="container-valor">
                        <img class="logo-publisher" src="img/Xbox_one_logo.svg.webp" alt="logo da publisher">
                        <h5 class="valor">R$ 150,00</h5>
                    </div>
                </a>
            </article>

            <article class="card-game">
                <a class="pag-game" href="#">
                    <img src="img/apps.21536.13727851868390641.c9cc5f66-aff8-406c-af6b-440838730be0.68796bde-cbf5-4eaa-a299-011417041da6" alt="halo infinit">
                    <h3 class="title">Halo Infinit</h3>
                    <div class="container-valor">
                        <img class="logo-publisher" src="img/Xbox_one_logo.svg.webp" alt="logo da publisher">
                        <h5 class="valor">R$ 150,00</h5>
                    </div>
                </a>
            </article>


        </main>
     </div>
</body>
</html>
